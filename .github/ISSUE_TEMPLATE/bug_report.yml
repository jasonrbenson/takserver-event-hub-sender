name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear summary of the bug.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or log output if available.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Configure ...
        2. Deploy ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin Version
      description: Version of the plugin where the bug was observed.
      placeholder: e.g. v1.0.0

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any relevant environment details.
      placeholder: |
        - TAK Server version:
        - Java version:
        - Azure cloud: Commercial / Government / China
        - OS:

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information, screenshots, or log snippets.
