name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and create shadow JAR
        run: ./gradlew clean build shadowJar

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: event-hub-sender-plugin-jars
          path: build/libs/*.jar
          retention-days: 30
